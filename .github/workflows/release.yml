name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g., 1.3.4)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AKKA_REPO_TOKEN: ${{ secrets.AKKA_REPO_TOKEN }}
    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set Up SBT
        uses: sbt/setup-sbt@v1

      - name: Coursier Caching
        uses: coursier/cache-action@v6

      - name: Build, Test, and Publish
        # sbt 2 parses CLI args as one command line; use ;-separated commands.
        run: sbt -v "; clean; test; publish"

      - name: Collect Artifacts
        run: |
          mkdir -p staging
          # sbt 2 target layout: target/out/jvm/scala-<v>/sbt-ossuminc/sbt-ossuminc_sbt2_3-*.jar
          cp target/out/jvm/scala-*/sbt-ossuminc/sbt-ossuminc_sbt2_3-*.jar staging/
          ls -la staging/

      - name: Upload Artifacts to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" staging/*.jar --clobber

      - name: Cleanup Before Caching
        shell: bash
        run: |
          rm -rf "$HOME/.ivy2/local" || true
          find $HOME/.cache/coursier/v1 -name "ivydata-*.properties" -delete || true
          find $HOME/.ivy2/cache -name "ivydata-*.properties" -delete || true
          find $HOME/.sbt -name "*.lock" -delete || true
